name: Flutter CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4. Run tests
      - name: Run Tests
        run: flutter test
        continue-on-error: true

      # 4.1 Create local.properties (baca versi dari pubspec.yaml otomatis)
      - name: Create local.properties
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | tr -d '\r')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "flutter.versionCode=$VERSION_CODE" > android/local.properties
          echo "flutter.versionName=$VERSION_NAME" >> android/local.properties
          echo "✅ Version: $VERSION_NAME ($VERSION_CODE)"

      # 4.2 Setup keystore for release signing (jika secret tersedia)
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
              "$KEYSTORE_PASSWORD" \
              "$KEY_PASSWORD" \
              "$KEY_ALIAS" \
              "keystore.jks" > android/key.properties
            echo "✅ Keystore setup selesai"
          else
            echo "⚠️ KEYSTORE_BASE64 tidak ditemukan, skip signing setup (pakai debug key)"
          fi

      # 5. Build APK
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 6. Upload artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk

      # 7. Create GitHub Release (hanya saat tag)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-release.apk

      # 8. Notify Telegram (Success)
      - name: 📢 Notify Telegram (Success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Build APK berhasil untuk commit ${{ github.sha }}"

      # 9. Notify Telegram (Failed)
      - name: ❌ Notify Telegram (Failed)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build gagal di GitHub Actions"

      - name: Send APK to Telegram
        if: success()
        run: |
          for file in build/app/outputs/flutter-apk/*.apk; do
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F document=@$file \
            -F caption="📦 APK berhasil di-build 🚀"
          done
